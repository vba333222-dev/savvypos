name: savvy_pos
description: "Savvy POS - Enterprise Offline-First mPOS with Antigravity UI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^8.0.2
  injectable: ^2.5.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.20.1
  logger: ^2.5.0
  go_router: ^8.0.1
  
  # Data
  drift: ^2.19.0                 # Stable 2.19
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.2
  
  dio: ^5.7.0
  dio_smart_retry: ^6.0.0
  retrofit: ^4.9.0               # Latest Stable 4.x
  connectivity_plus: ^6.1.0
  workmanager: ^0.7.0

  # UI
  flutter_animate: ^4.5.0
  wolt_modal_sheet: ^0.5.0
  gap: ^3.0.1
  sliver_tools: ^0.2.12
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  fluttertoast: ^8.2.8

  # Monetization
  google_mobile_ads: ^5.2.0
  purchases_flutter: ^8.3.0
  
  # Hardware
  mobile_scanner: ^6.0.2         
  print_bluetooth_thermal: ^1.1.9
  permission_handler: ^11.3.1
  usb_serial: ^0.5.2
  esc_pos_utils_plus: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11          
  drift_dev: ^2.19.0             
  injectable_generator: ^2.6.2   
  # retrofit_generator: DISABLED - Incompatible with current analyzer. Use manual API definition or wait for update.
  freezed: ^2.5.7                
  json_serializable: ^6.9.0      

flutter:
  uses-material-design: true